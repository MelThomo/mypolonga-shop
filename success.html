<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Mypolonga Orchard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', sans-serif;
      background: #F7F4EF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
    }
    .tick {
      width: 80px;
      height: 80px;
      background: #9BBF1B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 40px;
      color: #fff;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #2C2A26;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #6B6560;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .highlight {
      background: #F0F7D4;
      border-radius: 10px;
      padding: 16px 20px;
      margin: 24px 0;
      font-size: 15px;
      color: #4a5e10;
      font-weight: 600;
    }
    .btn {
      display: inline-block;
      background: #9BBF1B;
      color: #fff;
      font-family: 'Raleway', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover { background: #7a9a12; }
    .logo {
      width: 80px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="images/mypolonga-orchard-logo.webp" alt="Mypolonga Orchard" />
    <div class="tick">✓</div>
    <h1>Order Confirmed!</h1>
    <p>Thank you for your order from Mypolonga Orchard. The Thomson Family will get your parcel packed and on its way soon.</p>
    <div class="highlight">
      📧 A confirmation email will be sent to you shortly.<br/>
      📦 We ship Australia-wide via Aus Post.
    </div>
    <p>Questions? Email us at <strong>jthomson@mypolonga.com.au</strong></p>
    <a class="btn" href="https://shop.mypolongaorchard.com.au/">Back to Shop</a>
  </div>
</body>
</html>
