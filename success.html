<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Mypolonga Orchard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', sans-serif;
      background: #F7F4EF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
    }
    .logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 24px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .tick {
      width: 80px;
      height: 80px;
      background: #9BBF1B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .tick svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #2C2A26;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #6B6560;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .highlight {
      background: #F0F7D4;
      border-radius: 10px;
      padding: 16px 20px;
      margin: 24px 0;
      font-size: 15px;
      color: #4a5e10;
      font-weight: 600;
    }
    .highlight-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      justify-content: center;
    }
    .highlight-row:last-child { margin-bottom: 0; }
    .highlight-row svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      stroke: #4a5e10;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .btn {
      display: inline-block;
      background: #9BBF1B;
      color: #fff;
      font-family: 'Raleway', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover { background: #7a9a12; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="images/logo.webp" alt="Mypolonga Orchard" />
    <div class="tick">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Order Confirmed!</h1>
    <p>Thank you for your order from Mypolonga Orchard. The Thomson Family will get your parcel packed and on its way soon.</p>
    <div class="highlight">
      <div class="highlight-row">
        <!-- Envelope icon -->
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        <span>A confirmation email will be sent to you shortly.</span>
      </div>
      <div class="highlight-row">
        <!-- Truck/shipping icon -->
        <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <span>We ship Australia-wide via Aus Post.</span>
      </div>
    </div>
    <p>Questions? Email us at <strong>mypolongaorchard@gmail.com</strong></p>
    <a class="btn" href="https://shop.mypolongaorchard.com.au/">Back to Shop</a>
  </div>
  <script>
    // Fire order notification emails as soon as the success page loads
    (function() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      if (!sessionId) return;
      fetch('/.netlify/functions/order-notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      }).catch(function(err) { console.error('Notify error:', err); });
    })();
  </script>
</body>
</html>
